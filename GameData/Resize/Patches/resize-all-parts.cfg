@PART:HAS[~scale]:AFTER[zzzzzz_Resize]
{
	%scale = 1
}
@PART:HAS[~rescaleFactor]:AFTER[zzzzzz_Resize]
{
	%rescaleFactor = 1
}

@PART:AFTER[zzzzzz_Resize]
{
	%scale = 1
	%rescaleFactor *= 1.6

	@title ^= :1\.5m:2.4:

	@title ^= :0\.9375:1.5:
	@title ^= :0\.3125:0.5:

	@title ^= :9\.375:15:
	@title ^= :8\.125:13:
	@title ^= :6\.875:11:
	@title ^= :5\.625:9:
	@title ^= :4\.375:7:
	@title ^= :3\.125:5:
	@title ^= :1\.875:3:
	@title ^= :0\.625:1:

	@title ^= :8\.75:14:
	@title ^= :6\.25:10:
	@title ^= :4\.25:6.8:
	@title ^= :3\.75:6:
	@title ^= :2\.25:3.6:
	@title ^= :1\.25:2:
	@title ^= :0\.15:0.24:

	@title ^= :7\.5m:12:
	@title ^= :2\.5m:4:
	@title ^= :0\.1m:0.16:

	@title ^= :20m:32m:
	@title ^= :15m:24m:
	@title ^= :10m:16m:
	@title ^= :5m:8m:

	//@cost *= 4
	
	@MODULE[ModuleEngines*],*
	{
		@minThrust *= 4
		@maxThrust *= 4
	}

	@RESOURCE,*
	{
		@amount *= 4
		@maxAmount *= 4
	}

	@MODULE[ModuleIgnitionTankController],*
	{
		@volume *= 4
		@addedMass *= 4
		//@addedCost *= 4
	}

	@MODULE[ModuleB9PartSwitch],*
	{
		@baseVolume *= 4

		@SUBTYPE,*
		{
			@addedMass *= 4
			//@addedCost *= 4
			@volumeAdded *= 4
			@volumeAddedToParent *= 4

			@MODULE:HAS[@IDENTIFIER[ModuleEngines*],@DATA:HAS[#maxThrust]],*
			{
				@DATA
				{
					@maxThrust *= 4
				}
			}
		}
	}

	@MODULE[ModuleDragModifier],*
	{
		@dragModifier /= 2.56
	}

	@DRAG_CUBE
	{
		@cube,*[1,,] *= 1.6
		@cube,*[3,,] *= 1.6
		@cube,*[4,,] *= 1.6
		@cube,*[6,,] *= 1.6
		@cube,*[7,,] *= 1.6
		@cube,*[9,,] *= 1.6
		@cube,*[10,,] *= 1.6
		@cube,*[12,,] *= 1.6
		@cube,*[13,,] *= 1.6
		@cube,*[15,,] *= 1.6
		@cube,*[16,,] *= 1.6
		@cube,*[18,,] *= 1.6
		@cube,*[19,,] *= 1.6
		@cube,*[20,,] *= 1.6
		@cube,*[21,,] *= 1.6
		@cube,*[22,,] *= 1.6
		@cube,*[23,,] *= 1.6
		@cube,*[24,,] *= 1.6
	}
}

@PART:HAS[~name[bluedog*],~name[Bluedog*],#mass]:AFTER[zzzzzz_Resize]
{
	@mass *= 4
}